<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperToken Playground</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
    }

    .header {
      background: rgba(0,0,0,0.3);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header h1 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .game-select {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
    }

    .game-select option {
      background: #1a1a2e;
      color: white;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    .panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .panel h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 1rem;
    }

    .game-area {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 84px;
      background: white;
      color: #333;
      border-radius: 8px;
      font-size: 1.5rem;
      font-weight: bold;
      margin: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .card.red { color: #e94560; }
    .card.hidden {
      background: linear-gradient(135deg, #2a4a7a 0%, #1a3a6a 100%);
      color: transparent;
    }

    .hand { margin: 1rem 0; text-align: center; }
    .hand-label {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }
    .btn-primary:hover { background: #ff6b6b; }
    .btn-primary:disabled { background: #444; cursor: not-allowed; }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .btn-secondary:disabled { background: rgba(255,255,255,0.05); cursor: not-allowed; }

    .btn-train {
      background: #4ade80;
      color: #000;
    }
    .btn-train:hover { background: #6ee7a0; }
    .btn-train:disabled { background: #444; color: #888; cursor: not-allowed; }

    .training-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #22c55e);
      transition: width 0.3s;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4ade80;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
    }

    .chart-container {
      height: 200px;
      margin-top: 1rem;
    }

    .console {
      background: #0a0a12;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.8rem;
      max-height: 150px;
      overflow-y: auto;
      color: #888;
    }

    .console-line { margin: 2px 0; }
    .console-line.success { color: #4ade80; }
    .console-line.error { color: #f87171; }
    .console-line.info { color: #60a5fa; }

    .footer {
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.875rem;
    }

    .footer a {
      color: #888;
      text-decoration: none;
    }
    .footer a:hover { color: #fff; }

    /* Game-specific styles */
    .ttt-board {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 4px;
    }

    .ttt-cell {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ttt-cell:hover { background: rgba(255,255,255,0.2); }
    .ttt-cell:disabled { cursor: not-allowed; }
    .ttt-cell.x { color: #60a5fa; }
    .ttt-cell.o { color: #f472b6; }

    .pd-matrix {
      display: grid;
      grid-template-columns: auto repeat(2, 100px);
      gap: 4px;
      text-align: center;
    }

    .pd-cell {
      padding: 1rem;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }
    .pd-header { font-weight: bold; color: #888; }
    .pd-highlight { background: rgba(74, 222, 128, 0.2); }

    /* Result display */
    #result {
      margin-top: 1rem;
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 1.5em;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>HyperToken Playground</h1>
    <select id="game-select" class="game-select">
      <option value="blackjack">Blackjack</option>
      <option value="tictactoe">Tic-Tac-Toe</option>
      <option value="prisoners">Prisoner's Dilemma</option>
    </select>
  </header>

  <main class="main">
    <!-- Game Panel -->
    <section class="panel">
      <h2>Game</h2>
      <div id="game-area" class="game-area">
        <!-- Game-specific UI injected here -->
      </div>
      <div id="game-controls" class="controls">
        <!-- Game-specific controls injected here -->
      </div>
    </section>

    <!-- Training Panel -->
    <section class="panel training-panel">
      <h2>AI Training</h2>

      <div class="controls">
        <button id="btn-train" class="btn-train">Train AI (1000 episodes)</button>
        <button id="btn-stop" class="btn-secondary" disabled>Stop</button>
      </div>

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>

      <div class="stats">
        <div>
          <div id="stat-episode" class="stat-value">0</div>
          <div class="stat-label">Episode</div>
        </div>
        <div>
          <div id="stat-reward" class="stat-value">0.0</div>
          <div class="stat-label">Avg Reward</div>
        </div>
        <div>
          <div id="stat-winrate" class="stat-value">0%</div>
          <div class="stat-label">Win Rate</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="reward-chart"></canvas>
      </div>

      <div id="console" class="console">
        <div class="console-line info">Welcome to HyperToken Playground!</div>
        <div class="console-line">Select a game and click "Train AI" to begin.</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>
      Built with care by
      <a href="https://github.com/flammafex/hypertoken" target="_blank">HyperToken</a>
      &middot; Apache 2.0 License
    </p>
  </footer>

  <script type="module" src="playground.js"></script>
</body>
</html>
